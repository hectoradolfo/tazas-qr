<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de mi Taza</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            padding: 20px; 
            background: #f8f8f8; 
        }
        h2 { color: #333; }
        img { 
            max-width: 100%; 
            border-radius: 12px; 
            margin: 15px 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        button { 
            padding: 14px 20px; 
            margin: 10px; 
            font-size: 17px; 
            border: none; 
            border-radius: 8px; 
            background: #0066cc; 
            color: white;
        }
        #status { margin: 15px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>
    <h2>📸 Fotos de mi Taza</h2>
    <div id="status"></div>
    
    <input type="file" id="photoInput" accept="image/*" style="display:none;">
    <button onclick="document.getElementById('photoInput').click()">📸 Subir nueva foto</button>
    <button onclick="loadPhoto()">👀 Ver fotos guardadas</button>

    <div id="photoContainer"></div>

    <script>
        const USER = "hectoradolfo";
        const REPO = "tazas-qr";
        const TOKEN = "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";
        const HASH = "taza001";     

        const filePath = `${HASH}.txt`;
        const apiUrl = `https://api.github.com/repos/${USER}/${REPO}/contents/${filePath}`;

        // Subir foto
        document.getElementById('photoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            status.textContent = "Procesando foto...";

            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                await uploadToGitHub(base64);
            };
            reader.readAsDataURL(file);
        });

        async function uploadToGitHub(base64) {
            const status = document.getElementById('status');
            status.textContent = "Subiendo a GitHub...";

            try {
                let sha = null;
                try {
                    const resp = await fetch(apiUrl, {
                        headers: { 'Authorization': `token ${TOKEN}` }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        sha = data.sha;
                    }
                } catch(e){}

                const content = btoa(unescape(encodeURIComponent(base64)));

                await fetch(apiUrl, {
                    method: "PUT",
                    headers: {
                        'Authorization': `token ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Nueva foto desde la taza",
                        content: content,
                        sha: sha
                    })
                });

                status.textContent = "✅ ¡Foto guardada correctamente!";
                setTimeout(() => status.textContent = "", 3000);
            } catch(err) {
                status.textContent = "❌ Error al subir";
                console.error(err);
            }
        }

        // Ver fotos
        async function loadPhoto() {
            const status = document.getElementById('status');
            const container = document.getElementById('photoContainer');
            container.innerHTML = "";
            status.textContent = "Cargando...";

            try {
                const resp = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });

                if (!resp.ok) {
                    if (resp.status === 404) {
                        status.textContent = "Esta taza todavía no tiene fotos";
                    } else {
                        status.textContent = "Error al cargar";
                    }
                    return;
                }

                const data = await resp.json();
                const base64 = decodeURIComponent(escape(atob(data.content)));

                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${base64}`;
                container.appendChild(img);

                status.textContent = "✅ Foto cargada";
            } catch(err) {
                status.textContent = "❌ Error al cargar";
                console.error(err);
            }
        }
    </script>
</body>
</html>
